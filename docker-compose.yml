services:
  skland-sign:
    # 默认使用预构建镜像
    image: kafuneri/skland-sign-in:latest    
    # 如果你需要修改源码并进行本地构建，请注释掉上面的 image 行，并取消下方 build 行的注释
    # build: .    
    container_name: skland-sign
    restart: always
    volumes:
      - ./config.yaml:/app/config.yaml
    ports:
      - "8080:8080"    # Web 管理界面端口，可按需修改左侧端口号
    environment:
      - TZ=Asia/Shanghai
      # Web 管理界面登录密码，留空则不启用密码保护
      - WEB_PASSWORD=
      # Web 监听端口（需与 ports 中右侧端口一致）
      - WEB_PORT=8080
