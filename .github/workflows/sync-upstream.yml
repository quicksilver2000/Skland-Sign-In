name: Sync Upstream

on:
  schedule:
    # 每 6 小时检查一次上游更新（UTC 时间 0/6/12/18 点整）
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/kafuneri/Skland-Sign-In.git
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master 2>/dev/null || git rev-parse upstream/main)
          echo "local=$LOCAL"
          echo "upstream=$UPSTREAM"
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into main
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 优先尝试 master，否则回退到 main
          UPSTREAM_BRANCH=$(git branch -r | grep 'upstream/master' | head -n 1 | xargs)
          if [ -z "$UPSTREAM_BRANCH" ]; then
            UPSTREAM_BRANCH="upstream/main"
          fi

          git merge "$UPSTREAM_BRANCH" --no-edit --strategy-option=theirs \
            -m "chore: sync from upstream $UPSTREAM_BRANCH"

          git push origin main
