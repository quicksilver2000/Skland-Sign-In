<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 - Skland 签到管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-sm" style="width:340px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-star-fill text-warning fs-2"></i>
        <h6 class="mt-2 mb-1 fw-bold">森空岛签到管理</h6>
        <small class="text-muted">请输入密码以继续</small>
      </div>
      {% if error %}
      <div class="alert alert-danger py-2 small mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i>密码错误，请重试
      </div>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <input type="password" name="password" class="form-control"
            placeholder="密码" autofocus autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>登录
        </button>
      </form>
    </div>
  </div>
</body>
</html>
