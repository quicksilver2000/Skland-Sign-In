{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0" style="color:var(--text-primary);letter-spacing:1px;text-transform:uppercase;font-size:0.95rem;">
    <img class="header-icon" src="https://raw.githubusercontent.com/Yue-plus/endfield_icons/main/svg/endfield-industries.svg"
         alt="" style="height:20px;margin-right:8px;vertical-align:-4px;filter:brightness(0) invert(1);">配置文件
  </h5>
  <div class="text-muted small">
    <i class="bi bi-keyboard me-1"></i>Ctrl+S 保存
  </div>
</div>

<div class="card">
  <div class="card-body p-3">
    {% if saved %}
    <div class="mb-3" style="background:var(--yellow-dim);border:1px solid rgba(255,215,0,0.3);border-radius:2px;padding:10px 14px;color:var(--yellow);font-size:0.85rem;">
      <i class="bi bi-check-circle me-1"></i>配置已保存
    </div>
    {% endif %}
    {% if error %}
    <div class="mb-3" style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:2px;padding:10px 14px;color:#ff6b6b;font-size:0.85rem;">
      <i class="bi bi-exclamation-triangle me-1"></i>YAML 语法错误：<br><code style="background:transparent;border:none;color:#ff6b6b;padding:0;white-space:pre-wrap;">{{ error }}</code>
    </div>
    {% endif %}
    <form method="post" action="/config">
      <textarea id="yaml-area" name="config_text" class="w-100">{{ config_text }}</textarea>
      <div class="d-flex justify-content-end gap-2 mt-3">
        <a href="/config" class="btn btn-outline-secondary btn-sm">取消</a>
        <button type="submit" class="btn btn-primary btn-sm">
          <i class="bi bi-save me-1"></i>保存配置
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    const form = document.querySelector('form');
    if (form) form.submit();
  }
});
</script>
{% endblock %}
