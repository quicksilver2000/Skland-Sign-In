<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Skland 签到管理</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Yue-plus/arknights_icons/main/site-icons/icon_skland.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --bg-dark: #f5f5f0;
      --bg-panel: #ffffff;
      --bg-card: #ffffff;
      --border-color: #d0d0c8;
      --text-primary: #1a1a1a;
      --text-secondary: #777;
      --yellow: #d4a800;
      --yellow-dim: rgba(212,168,0,0.1);
      --yellow-glow: rgba(212,168,0,0.2);
      --warning: #cc7000;
      --danger: #cc3333;
      --icon-filter: brightness(0);
      --stripe: rgba(0,0,0,0.015);
      --code-bg: #f0efe8;
      --log-bg: #f5f4ee;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-dark: #0a0a0a;
        --bg-panel: #111111;
        --bg-card: #1a1a1a;
        --border-color: #2a2a2a;
        --text-primary: #e0e0e0;
        --text-secondary: #888;
        --yellow: #ffd700;
        --yellow-dim: rgba(255,215,0,0.12);
        --yellow-glow: rgba(255,215,0,0.25);
        --warning: #ff8c00;
        --danger: #ff4444;
        --icon-filter: brightness(0) invert(1);
        --stripe: rgba(255,215,0,0.012);
        --code-bg: #0d0d0d;
        --log-bg: #0d0d0d;
      }
    }
    * { scrollbar-width: thin; scrollbar-color: var(--yellow-dim) transparent; }
    *::-webkit-scrollbar { width: 6px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--yellow-dim); border-radius: 3px; }
    body {
      background: var(--bg-dark);
      min-height: 100vh;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 20px,
        var(--stripe) 20px, var(--stripe) 21px
      );
      pointer-events: none;
      z-index: 9999;
    }
    .navbar {
      background: var(--bg-panel) !important;
      border-bottom: 2px solid var(--yellow);
      box-shadow: 0 0 20px var(--yellow-glow);
      transition: background 0.3s;
    }
    .navbar-brand { letter-spacing: 2px; font-weight: 700; }
    .navbar-brand img { height: 28px; filter: var(--icon-filter); }
    .nav-link {
      border-radius: 0;
      margin: 0 2px;
      transition: all 0.2s ease;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary) !important;
    }
    .nav-link:hover { background: var(--yellow-dim); color: var(--yellow) !important; }
    .nav-link.active {
      background: var(--yellow-dim) !important;
      color: var(--yellow) !important;
      border-bottom-color: var(--yellow);
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      transition: all 0.2s ease, background 0.3s, border-color 0.3s;
    }
    .card:hover { border-color: var(--yellow); }
    .card-header {
      background: linear-gradient(180deg, color-mix(in srgb, var(--bg-card) 95%, var(--yellow)), var(--bg-card));
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      border-radius: 3px 3px 0 0 !important;
      padding: 10px 16px;
    }
    .card-header .header-icon { height: 20px; margin-right: 8px; vertical-align: -4px; filter: var(--icon-filter); }
    .card-body { padding: 20px; }
    .btn {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .btn-primary {
      background: transparent;
      border: 2px solid var(--yellow);
      border-radius: 2px;
      color: var(--yellow);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
      padding: 8px 20px;
      transition: all 0.25s ease;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--yellow);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: -1;
    }
    .btn-primary:hover::before { transform: scaleX(1); transform-origin: left; }
    .btn-primary:hover { color: var(--bg-dark); box-shadow: 0 0 30px var(--yellow-glow); }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:disabled { border-color: #444; color: #555; background: transparent; box-shadow: none; }
    .btn-primary:disabled::before { display: none; }
    .btn-outline-secondary {
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.8rem;
      transition: all 0.25s ease;
    }
    .btn-outline-secondary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--yellow-dim);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: -1;
    }
    .btn-outline-secondary:hover::before { transform: scaleY(1); transform-origin: top; }
    .btn-outline-secondary:hover { color: var(--yellow); border-color: var(--yellow); }
    .btn-outline-secondary:active { transform: scale(0.96); }
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--yellow);
      opacity: 0.4;
      transform: scale(0);
      animation: ripple-anim 0.6s ease-out;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
    .badge {
      padding: 4px 12px;
      border-radius: 2px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
    }
    .badge.bg-success { background: var(--yellow-dim) !important; color: var(--yellow) !important; border: 1px solid var(--yellow); }
    .badge.bg-warning { background: rgba(204,112,0,0.15) !important; color: var(--warning) !important; border: 1px solid var(--warning); }
    .form-control {
      background: var(--log-bg);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      color: var(--text-primary);
      transition: all 0.2s ease, background 0.3s, color 0.3s;
    }
    .form-control:focus {
      background: var(--log-bg);
      border-color: var(--yellow);
      box-shadow: 0 0 0 2px var(--yellow-dim);
      color: var(--text-primary);
    }
    .form-control::placeholder { color: var(--text-secondary); }
    .form-check-input { background: var(--log-bg); border: 1px solid var(--border-color); }
    .form-check-input:checked { background-color: var(--yellow); border-color: var(--yellow); }
    .text-muted { color: var(--text-secondary) !important; }
    a { color: var(--yellow); }
    a:hover { color: #e6b800; }
    code {
      background: var(--yellow-dim);
      padding: 2px 8px;
      border-radius: 2px;
      color: var(--yellow);
      border: 1px solid rgba(212,168,0,0.15);
    }
    hr { border-color: var(--border-color); opacity: 0.5; }
    #yaml-area {
      font-family: 'Courier New', Consolas, 'Liberation Mono', monospace;
      font-size: .85rem;
      min-height: 540px;
      resize: vertical;
      background: var(--code-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      padding: 16px;
      line-height: 1.6;
      tab-size: 2;
      transition: background 0.3s, color 0.3s;
    }
    #yaml-area:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 0 2px var(--yellow-dim); }
    .log-box {
      font-family: 'Courier New', Consolas, 'Liberation Mono', monospace;
      font-size: .82rem;
      background: var(--log-bg);
      color: #d4d4d4;
      border-radius: 2px;
      border: 1px solid var(--border-color);
      transition: background 0.3s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 0;
      margin-right: 8px;
      transform: rotate(45deg);
    }
    .status-dot.running { background: var(--warning); animation: pulse 1s ease-in-out infinite; box-shadow: 0 0 12px var(--warning); }
    .status-dot.idle { background: var(--yellow); box-shadow: 0 0 12px var(--yellow-glow); }
    .navbar-toggler-icon { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23d4a800' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e"); filter: var(--icon-filter); }
    @media (prefers-color-scheme: dark) { .navbar-toggler-icon { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23ffd700' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e"); } }
    .container-wrap { max-width: 960px; }

    /* ── Mobile optimizations ── */
    @media (max-width: 576px) {
      .container-wrap { padding-left: 12px; padding-right: 12px; }
      .card-body { padding: 16px; }
      .card-header { padding: 10px 12px; font-size: 0.78rem; letter-spacing: 0.5px; }
      .btn { min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
      .btn-sm { min-height: 36px; }
      .navbar-brand { font-size: 0.95rem; }
      .navbar-brand img { height: 24px; }
      .navbar .btn-sm { min-height: 40px; width: 100%; margin-top: 6px; }
      .log-box { font-size: .72rem; padding: 10px !important; }
      #yaml-area { font-size: .78rem; padding: 12px; min-height: 360px; }
      .game-logos img { height: 26px; }
      .login-card { width: calc(100% - 24px); padding: 28px 20px 24px; }
      h5.mb-0 { font-size: 0.85rem !important; }
      .status-dot { width: 10px; height: 10px; }
      .d-flex.gap-3 { gap: 8px !important; flex-wrap: wrap; }
      .d-flex.justify-content-between.align-items-center.mb-3 { flex-wrap: wrap; gap: 8px; }
    }
    @media (max-width: 768px) {
      .container-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container container-wrap">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <img src="https://raw.githubusercontent.com/Yue-plus/arknights_icons/main/site-icons/logo_rhodes_island.svg"
           alt="Rhodes Island" height="28">
      <span style="color:var(--yellow);text-shadow:0 0 20px var(--yellow-glow);">森空岛签到</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-label="导航菜单">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>控制台
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/config' in request.url.path %}active{% endif %}" href="/config">
            <i class="bi bi-sliders me-1"></i>配置
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/logs' in request.url.path %}active{% endif %}" href="/logs">
            <i class="bi bi-journal-code me-1"></i>日志
          </a>
        </li>
      </ul>
      {% if has_password %}
      <a class="btn btn-sm btn-outline-secondary" href="/logout">
        <i class="bi bi-box-arrow-right me-1"></i>退出
      </a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container container-wrap py-4">
  {% block content %}{% endblock %}
</div>

<footer class="text-center pb-3" style="color:var(--text-secondary);font-size:0.78rem;">
  <a href="{{ repo_url }}" target="_blank" rel="noopener" style="color:var(--text-secondary);text-decoration:none;">{{ repo_url }}</a>
  <span class="mx-2">·</span>
  v{{ version }}
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = e.clientX - rect.left - size / 2;
  const y = e.clientY - rect.top - size / 2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
