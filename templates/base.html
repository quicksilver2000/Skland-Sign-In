<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Skland 签到管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #f0f2f5; }
    .navbar { box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    #yaml-area {
      font-family: Consolas, 'Courier New', monospace;
      font-size: .82rem;
      min-height: 540px;
      resize: vertical;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      border-radius: 0;
    }
    #yaml-area:focus { box-shadow: none; outline: 2px solid #0d6efd; }
    .log-box {
      font-family: Consolas, 'Courier New', monospace;
      font-size: .8rem;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 0 0 .375rem .375rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-star-fill text-warning me-2"></i>森空岛签到
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>控制台
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/config' in request.url.path %}active{% endif %}" href="/config">
            <i class="bi bi-sliders me-1"></i>配置
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/logs' in request.url.path %}active{% endif %}" href="/logs">
            <i class="bi bi-journal-code me-1"></i>日志
          </a>
        </li>
      </ul>
      {% if has_password %}
      <a class="btn btn-sm btn-outline-light" href="/logout">
        <i class="bi bi-box-arrow-right me-1"></i>退出
      </a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container py-4" style="max-width:900px">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
